# ============================================================
# Mezzofy AI Assistant — RBAC Role Definitions
# Source: SECURITY.md
# ============================================================

departments:
  - finance
  - sales
  - marketing
  - support
  - management
  - hr

roles:
  # ── Finance Department ───────────────────────────────────
  finance_viewer:
    department: finance
    permissions:
      - finance_read
      - hr_self_service

  finance_manager:
    department: finance
    permissions:
      - finance_read
      - finance_write
      - email_send
      - calendar_access
      - scheduler_manage         # Can create scheduled finance reports
      - hr_self_service

  # ── Sales Department ─────────────────────────────────────
  sales_rep:
    department: sales
    permissions:
      - sales_read
      - sales_write
      - email_send
      - linkedin_access
      - calendar_access
      - hr_self_service

  sales_manager:
    department: sales
    permissions:
      - sales_read
      - sales_write
      - email_send
      - linkedin_access
      - calendar_access
      - sales_admin
      - scheduler_manage
      - hr_self_service

  # ── Marketing Department ─────────────────────────────────
  marketing_creator:
    department: marketing
    permissions:
      - marketing_read
      - marketing_write
      - email_send
      - hr_self_service

  marketing_manager:
    department: marketing
    permissions:
      - marketing_read
      - marketing_write
      - email_send
      - marketing_admin
      - scheduler_manage
      - hr_self_service

  # ── Support Department ───────────────────────────────────
  support_agent:
    department: support
    permissions:
      - support_read
      - support_write
      - email_send
      - hr_self_service

  support_manager:
    department: support
    permissions:
      - support_read
      - support_write
      - email_send
      - support_admin
      - scheduler_manage
      - hr_self_service

  # ── HR Department ─────────────────────────────────────────
  hr_viewer:
    department: hr
    permissions:
      - hr_read
      - hr_self_service

  hr_staff:
    department: hr
    permissions:
      - hr_read
      - hr_write
      - hr_employee_manage
      - hr_leave_manage
      - hr_self_service
      - email_send

  hr_manager:
    department: hr
    permissions:
      - hr_read
      - hr_write
      - hr_employee_manage
      - hr_leave_manage
      - hr_admin
      - hr_reports
      - hr_self_service
      - email_send
      - calendar_access
      - scheduler_manage         # Can create scheduled HR reports

  # ── Management ───────────────────────────────────────────
  executive:
    department: management
    permissions:
      - management_read
      - management_admin
      - finance_read
      - sales_read
      - marketing_read
      - support_read
      - hr_read
      - hr_self_service
      - audit_read
      - legal_read              # Executives can receive legal analysis
      - email_send
      - calendar_access
      - scheduler_manage
      - teams_post              # Can post to any Teams channel

  admin:
    department: management
    permissions:
      - "*"                     # All permissions

  # ── Legal Department ──────────────────────────────────────────────
  legal_officer:
    department: legal
    permissions:
      - legal_read
      - legal_write
      - email_send
      - calendar_access

# ── Permission → Tool Mapping ────────────────────────────────
# (Reference for backend RBAC enforcement)
permission_tool_map:
  finance_read:
    - query_financial
    - financial_query
    - financial_format
  finance_write:
    - create_invoice
    - update_financial_record
  sales_read:
    - search_leads
    - get_lead
    - get_pipeline
    - export_leads
  sales_write:
    - create_lead
    - update_lead
  linkedin_access:
    - linkedin_search
    - linkedin_extract
  email_send:
    - outlook_send_email
    - outlook_batch_send
    - outlook_reply_email
  calendar_access:
    - outlook_create_event
    - outlook_get_events
    - outlook_find_free_slots
  teams_post:
    - teams_post_message
  scheduler_manage:
    - create_scheduled_job
    - delete_scheduled_job
  marketing_read:
    - get_products
    - search_knowledge
    - get_brand_guidelines
  marketing_write:
    - generate_content
    - create_pdf
    - create_docx
  support_read:
    - query_tickets
  support_write:
    - update_ticket
    - add_ticket_note
  management_read:
    - aggregate_by_dept
    - get_kpi_metrics
    - get_all_leads
    - get_all_reports
  hr_read:
    - query_analytics            # Used by hr_agent for leave, payroll, recruitment queries
    - query_hr_data
  hr_write:
    - update_hr_record
  hr_employee_manage:
    - update_hr_record
  hr_leave_manage:
    - update_hr_record
  hr_self_service:
    - query_hr_data
  hr_admin:
    - update_hr_record
    - query_hr_data
    - query_analytics
  hr_reports:
    - query_analytics
    - query_hr_data
  audit_read:
    - query_audit_log
  legal_read:
    - review_legal_document
    - get_legal_analysis
    - get_jurisdiction_info
  legal_write:
    - draft_contract
    - generate_legal_document
    - request_legal_review
