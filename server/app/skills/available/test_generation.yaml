name: "test_generation"
version: "1.0.0"
description: "Pytest scaffold generation with proper mocking patterns for Mezzofy codebase"
agent: "developer"

dependencies:
  - pytest-asyncio>=0.23.0
  - pytest-mock>=3.12.0

capabilities:
  - generate_unit_tests
  - generate_integration_tests

tools:
  - name: "generate_unit_tests"
    description: "Generate pytest unit tests for a Python module with proper mocking"
    parameters:
      code: { type: "string", required: true }
      module_path: { type: "string", required: false }
      focus: { type: "string", required: false }

  - name: "generate_integration_tests"
    description: "Generate FastAPI integration tests using TestClient"
    parameters:
      api_spec: { type: "string", required: true }
      base_url: { type: "string", required: false }
